name: Deploy to Vercel (Production)

# Auto-deploys main to the Vercel production domain on every push.
# Uses `vercel deploy --prod`, which always promotes to production —
# independent of the project's "Production Branch" dashboard setting.
#
# Requires three repo secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN       - Vercel -> Account Settings -> Tokens -> Create
#   VERCEL_ORG_ID      - Vercel project -> Settings -> general (a.k.a. Team ID)
#   VERCEL_PROJECT_ID  - Vercel project -> Settings -> general (Project ID)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (runs npm run build -> Nitro vercel preset)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
